<div
  class="fixed bottom-5 right-5 z-50 flex flex-col gap-2 pointer-events-none"
  aria-live="polite"
  aria-atomic="false">
  @for (toast of toastService.toasts(); track trackById($index, toast)) {
    <div
      class="pointer-events-auto flex items-start gap-3 w-80 max-w-sm px-4 py-3 rounded-xl shadow-xl text-white"
      [ngClass]="bgClass(toast.type)"
      role="alert">
      <svg class="w-5 h-5 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="iconPath(toast.type)" />
      </svg>
      <span class="flex-1 text-sm leading-snug">{{ toast.message }}</span>
      <button
        (click)="remove(toast.id)"
        class="flex-shrink-0 text-white/70 hover:text-white transition-colors"
        aria-label="Dismiss notification">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>
  }
</div>
