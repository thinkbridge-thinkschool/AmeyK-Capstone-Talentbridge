<!-- Uploaded state -->
@if (uploadedUrl()) {
  <div class="flex items-center gap-3 bg-green-50 border border-green-200 rounded-xl px-4 py-3">
    <svg class="w-5 h-5 text-green-600 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
    </svg>
    <a [href]="uploadedUrl()!" target="_blank" class="text-sm text-green-700 font-medium hover:underline flex-1 truncate">
      Resume uploaded successfully
    </a>
    <button (click)="reset()" class="text-xs text-gray-500 hover:text-gray-700 ml-2 flex-shrink-0">Replace</button>
  </div>
} @else {
  <!-- Drop zone -->
  <div
    (dragover)="onDragOver($event)"
    (dragleave)="onDragLeave()"
    (drop)="onDrop($event)"
    [class]="'relative border-2 border-dashed rounded-xl px-6 py-8 text-center transition-colors cursor-pointer ' +
      (dragOver() ? 'border-blue-500 bg-blue-50' : 'border-gray-300 hover:border-blue-400 hover:bg-gray-50')">

    <input
      type="file"
      [accept]="ALLOWED"
      (change)="onFileSelected($event)"
      class="absolute inset-0 opacity-0 cursor-pointer w-full h-full"
      [disabled]="uploading()"/>

    @if (uploading()) {
      <!-- Progress -->
      <div class="flex flex-col items-center gap-3">
        <div class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center">
          <svg class="w-5 h-5 text-blue-600 animate-spin" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
          </svg>
        </div>
        <p class="text-sm text-gray-600">Uploading... {{ progress() }}%</p>
        <div class="w-full max-w-xs bg-gray-200 rounded-full h-1.5">
          <div class="bg-blue-600 h-1.5 rounded-full transition-all" [style.width.%]="progress()"></div>
        </div>
      </div>
    } @else {
      <div class="flex flex-col items-center gap-2">
        <div class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center">
          <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
          </svg>
        </div>
        <p class="text-sm text-gray-600">
          <span class="text-blue-600 font-medium">Click to upload</span> or drag & drop
        </p>
        <p class="text-xs text-gray-400">PDF, DOC, DOCX · Max {{ MAX_SIZE_MB }}MB</p>
      </div>
    }
  </div>
}

<!-- Error -->
@if (error()) {
  <p class="mt-1.5 text-xs text-red-600 flex items-center gap-1">
    <svg class="w-3.5 h-3.5 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
      <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
    </svg>
    {{ error() }}
  </p>
}
