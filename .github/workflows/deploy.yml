name: TalentBridge — Full Stack Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, prod]

env:
  RG: talentbridge-rg-amey
  APP_SERVICE_NAME: talentbridge-api-amey
  SWA_NAME: talentbridge-swa-amey2

jobs:
  # ── 1. Backend — Build .NET → Zip Deploy → App Service ───────────────────────
  deploy-backend:
    name: Build & Deploy API (App Service)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish API
        run: |
          dotnet publish src/API/TalentBridge.API/TalentBridge.API.csproj \
            --configuration Release \
            --output ./api-publish

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.APP_SERVICE_NAME }}
          package: ./api-publish

      - name: Show backend URL
        run: |
          URL=$(az webapp show --name $APP_SERVICE_NAME --resource-group $RG --query "defaultHostName" -o tsv)
          echo "Backend : https://$URL"
          echo "Swagger : https://$URL/swagger"

  # ── 2. Frontend — Build Angular → Azure Static Web App ───────────────────────
  deploy-frontend:
    name: Build Angular & Deploy Frontend (SWA)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build Angular (production)
        working-directory: frontend
        run: npx ng build --configuration production

      - name: Install SWA CLI & check binary deps
        run: |
          npm install -g @azure/static-web-apps-cli
          BINARY_HASH=689a6c1fe8fc32f40348cc41223a7e9d83dd43d2
          mkdir -p ~/.swa/deploy/$BINARY_HASH
          curl -sL "https://swalocaldeployv2-bndtgugjgqc3dhdx.b01.azurefd.net/downloads/$BINARY_HASH/linux/StaticSitesClient@$BINARY_HASH" \
            -o ~/.swa/deploy/$BINARY_HASH/StaticSitesClient
          chmod +x ~/.swa/deploy/$BINARY_HASH/StaticSitesClient
          echo "=== file type ===" && file ~/.swa/deploy/$BINARY_HASH/StaticSitesClient
          echo "=== ldd output ===" && ldd ~/.swa/deploy/$BINARY_HASH/StaticSitesClient || true
          echo "=== installing missing libs ===" && sudo apt-get install -y libssl1.1 libicu-dev libcurl4 || true

      - name: Deploy to SWA
        run: |
          swa deploy frontend/dist/talentbridge-angular/browser \
            --deployment-token "${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}" \
            --verbose

  # ── 3. Summary ───────────────────────────────────────────────────────────────
  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: always()

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Print live URLs
        run: |
          BACKEND=$(az webapp show --name $APP_SERVICE_NAME --resource-group $RG --query "defaultHostName" -o tsv)
          echo "======================================"
          echo "  TalentBridge Deployment Complete"
          echo "======================================"
          echo "  Environment : ${{ github.event.inputs.environment }}"
          echo "  Backend     : https://$BACKEND"
          echo "  Swagger     : https://$BACKEND/swagger"
          echo "  Frontend    : [SWA — $SWA_NAME]"
          echo "======================================"
