name: TalentBridge — Full Stack Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, prod]

env:
  RG: talentbridge-rg-amey
  APP_SERVICE_NAME: talentbridge-api-amey

jobs:
  # ── Single job: Build Angular + .NET → bundle → deploy ───────────────────────
  deploy:
    name: Build & Deploy Full Stack
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      # ── Angular build ─────────────────────────────────────────────────────────
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Angular (production)
        working-directory: frontend
        run: npm install && npx ng build --configuration production

      # ── .NET build ────────────────────────────────────────────────────────────
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish API
        run: |
          dotnet publish src/API/TalentBridge.API/TalentBridge.API.csproj \
            --configuration Release \
            --output ./api-publish

      # ── Bundle Angular into wwwroot ───────────────────────────────────────────
      - name: Bundle Angular into wwwroot
        run: |
          mkdir -p api-publish/wwwroot
          cp -r frontend/dist/talentbridge-angular/browser/. api-publish/wwwroot/

      # ── Deploy ────────────────────────────────────────────────────────────────
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.APP_SERVICE_NAME }}
          package: ./api-publish

      - name: Show live URLs
        run: |
          URL=$(az webapp show --name $APP_SERVICE_NAME --resource-group $RG --query "defaultHostName" -o tsv)
          echo "======================================"
          echo "  TalentBridge is LIVE"
          echo "======================================"
          echo "  Environment : ${{ github.event.inputs.environment }}"
          echo "  App         : https://$URL"
          echo "  Swagger     : https://$URL/swagger"
          echo "======================================"
