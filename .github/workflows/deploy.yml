name: TalentBridge — Full Stack Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, prod]

env:
  RG: talentbridge-rg-amey
  ACR_NAME: talentbridgeacramey
  APP_SERVICE_NAME: talentbridge-api-amey
  SWA_NAME: talentbridge-swa-amey2

jobs:
  # ── 1. Backend — Build Docker image → ACR → App Service ──────────────────────
  deploy-backend:
    name: Build & Deploy API (App Service)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build & push image to ACR
        run: |
          ACR_PASSWORD=$(az acr credential show --name $ACR_NAME --query "passwords[0].value" -o tsv)
          docker login $ACR_NAME.azurecr.io --username $ACR_NAME --password "$ACR_PASSWORD"
          docker build \
            -t $ACR_NAME.azurecr.io/talentbridge-api:${{ github.sha }} \
            -t $ACR_NAME.azurecr.io/talentbridge-api:latest \
            .
          docker push $ACR_NAME.azurecr.io/talentbridge-api:${{ github.sha }}
          docker push $ACR_NAME.azurecr.io/talentbridge-api:latest

      - name: Deploy image to App Service
        run: |
          ACR_PASSWORD=$(az acr credential show --name $ACR_NAME --query "passwords[0].value" -o tsv)
          az webapp config container set \
            --name $APP_SERVICE_NAME \
            --resource-group $RG \
            --docker-custom-image-name $ACR_NAME.azurecr.io/talentbridge-api:${{ github.sha }} \
            --docker-registry-server-url https://$ACR_NAME.azurecr.io \
            --docker-registry-server-user $ACR_NAME \
            --docker-registry-server-password "$ACR_PASSWORD"

      - name: Restart App Service
        run: az webapp restart --name $APP_SERVICE_NAME --resource-group $RG

      - name: Show backend URL
        run: |
          URL=$(az webapp show --name $APP_SERVICE_NAME --resource-group $RG --query "defaultHostName" -o tsv)
          echo "Backend : https://$URL"
          echo "Swagger : https://$URL/swagger"

  # ── 2. Frontend — Build Angular → Azure Static Web App ───────────────────────
  deploy-frontend:
    name: Build Angular & Deploy Frontend (SWA)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Angular (production)
        working-directory: frontend
        run: npx ng build --configuration production

      - name: Deploy to Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend
          output_location: dist/talentbridge-angular/browser

  # ── 3. Summary ───────────────────────────────────────────────────────────────
  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: always()

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Print live URLs
        run: |
          BACKEND=$(az webapp show --name $APP_SERVICE_NAME --resource-group $RG --query "defaultHostName" -o tsv)
          echo "======================================"
          echo "  TalentBridge Deployment Complete"
          echo "======================================"
          echo "  Environment : ${{ github.event.inputs.environment }}"
          echo "  Backend     : https://$BACKEND"
          echo "  Swagger     : https://$BACKEND/swagger"
          echo "  Frontend    : [SWA — $SWA_NAME]"
          echo "======================================"
